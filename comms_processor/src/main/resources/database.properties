# Database Configuration Properties
# Configure these values according to your environment
# Use environment variables or configure in application server for production

# PostgreSQL Configuration
postgresql.url=jdbc:postgresql://localhost:5432/comms_db
postgresql.username=comms_user
postgresql.password=${POSTGRES_PASSWORD}
postgresql.driver=org.postgresql.Driver

# Oracle Configuration
oracle.url=jdbc:oracle:thin:@localhost:1521:ORCL
oracle.username=comms_user
oracle.password=${ORACLE_PASSWORD}
oracle.driver=oracle.jdbc.OracleDriver

# Connection Pool Settings
connection.pool.min=5
connection.pool.max=20
